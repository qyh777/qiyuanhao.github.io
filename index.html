<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品价格目录 - 快速选品系统（带备注+数量优化）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", Arial, sans-serif;
        }
        body {
            background-color: #f5f7fa;
            padding: 20px;
            max-width: 1600px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 16px;
            color: #666;
        }
        .search-bar {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 25px;
            align-items: center;
        }
        .search-bar input {
            flex: 1;
            min-width: 250px;
            padding: 12px 18px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
        }
        .search-bar input:focus {
            border-color: #409eff;
        }
        .search-bar select {
            padding: 12px 18px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            cursor: pointer;
            transition: border 0.3s;
        }
        .search-bar select:focus {
            border-color: #409eff;
        }
        /* 已选清单样式调整 */
        .selection-list {
            background-color: #fff;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.08);
            margin-bottom: 30px;
        }
        .selection-list h2 {
            color: #333;
            font-size: 20px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .selection-list .clear-btn {
            font-size: 14px;
            padding: 6px 12px;
            background-color: #f56c6c;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .selection-list .clear-btn:hover {
            background-color: #e64949;
        }
        .list-empty {
            text-align: center;
            padding: 30px;
            color: #999;
            font-size: 16px;
        }
        .list-items {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .list-item {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: flex-start;
            padding: 15px;
            background-color: #f9fafc;
            border-radius: 6px;
            border-left: 3px solid #409eff;
            gap: 10px;
        }
        .list-item .product-basic {
            flex: 1;
            min-width: 200px;
        }
        .list-item .product-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
            font-size: 15px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        /* 备注样式优化 - 更显著 */
        .list-item .product-remark {
            font-size: 13px;
            color: #e64949;
            font-weight: 500;
            background-color: #fff5f5;
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid #fee2e2;
        }
        .list-item .product-spec {
            font-size: 13px;
            color: #666;
            margin-bottom: 3px;
        }
        /* 产品详细信息列 */
        .list-item .product-details {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            min-width: 300px;
        }
        .list-item .detail-item {
            font-size: 14px;
            color: #333;
            white-space: nowrap;
        }
        .list-item .detail-label {
            color: #666;
            margin-right: 4px;
        }
        /* 清单数量选择器样式 */
        .list-quantity-wrapper {
            display: flex;
            align-items: center;
            gap: 2px;
            min-width: 120px;
        }
        .list-quantity-btn {
            width: 28px;
            height: 28px;
            border: 1px solid #ddd;
            background-color: #f5f7fa;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            transition: all 0.2s;
        }
        .list-quantity-btn:hover {
            background-color: #409eff;
            color: #fff;
            border-color: #409eff;
        }
        .list-quantity-input {
            width: 60px;
            padding: 4px 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
            outline: none;
            transition: border 0.3s;
        }
        .list-quantity-input:focus {
            border-color: #409eff;
        }
        /* 操作和金额区域 */
        .list-item .product-actions {
            display: flex;
            align-items: center;
            gap: 15px;
            min-width: 200px;
            justify-content: flex-end;
        }
        .list-item .product-subtotal {
            font-size: 14px;
            color: #333;
            font-weight: 600;
        }
        .list-item .delete-btn {
            padding: 6px 12px;
            background-color: #f0f2f5;
            color: #666;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        .list-item .delete-btn:hover {
            background-color: #f56c6c;
            color: #fff;
        }
        .list-total {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            text-align: right;
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        /* 产品表格样式 */
        .product-table {
            width: 100%;
            border-collapse: collapse;
            background-color: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.08);
            margin-bottom: 30px;
        }
        .product-table thead {
            background-color: #409eff;
            color: #fff;
        }
        .product-table th, .product-table td {
            padding: 15px;
            text-align: center;
            border: 1px solid #eee;
        }
        .product-table th {
            font-weight: 600;
            font-size: 15px;
        }
        .product-table td {
            font-size: 14px;
            color: #333;
        }
        .product-table tbody tr:hover {
            background-color: #f8f9fa;
            cursor: default;
            transition: background-color 0.2s;
        }
        .product-table td:nth-child(4) {
            text-align: left;
            padding-left: 20px;
        }
        /* 复选框样式 */
        .checkbox-cell {
            width: 60px;
        }
        .product-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #409eff;
        }
        /* 表格数量选择器样式 */
        .quantity-cell {
            width: 150px;
        }
        .quantity-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }
        .quantity-input {
            width: 80px;
            padding: 6px 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
            outline: none;
            transition: border 0.3s;
        }
        .quantity-input:focus {
            border-color: #409eff;
        }
        .quantity-input:disabled, .remark-input:disabled {
            background-color: #f5f7fa;
            color: #999;
            cursor: not-allowed;
        }
        .quantity-btn {
            width: 28px;
            height: 28px;
            border: 1px solid #ddd;
            background-color: #f5f7fa;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            transition: all 0.2s;
        }
        .quantity-btn:hover:not(:disabled) {
            background-color: #409eff;
            color: #fff;
            border-color: #409eff;
        }
        .quantity-btn:disabled {
            color: #ccc;
            cursor: not-allowed;
            background-color: #fafafa;
        }
        /* 备注栏样式 */
        .remark-cell {
            width: 200px;
        }
        .remark-input {
            width: 180px;
            padding: 6px 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
            transition: border 0.3s;
        }
        .remark-input:focus {
            border-color: #409eff;
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .product-table {
                display: block;
                overflow-x: auto;
            }
            .header h1 {
                font-size: 24px;
            }
            .search-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .search-bar input, .search-bar select {
                min-width: 100%;
            }
            .list-item .product-details {
                min-width: 100%;
                gap: 10px;
            }
            .list-item .product-actions {
                min-width: 100%;
                justify-content: flex-start;
            }
            .list-item .detail-item {
                white-space: normal;
                width: 45%;
            }
        }
    </style>
</head>

        // 存储已选产品的数组
        let selectedProducts = [];

        // 渲染表格数据
        function renderTable(data) {
            const tbody = document.getElementById('productTableBody');
            tbody.innerHTML = '';
            
            data.forEach(item => {
                const tr = document.createElement('tr');
                const selectedItem = selectedProducts.find(p => p.index === item.index);
                const isSelected = !!selectedItem;
                const quantity = selectedItem ? selectedItem.quantity : 1;
                const remark = selectedItem ? selectedItem.remark : '';
                
                tr.innerHTML = `
                    <td class="checkbox-cell">
                        <input type="checkbox" class="product-checkbox" 
                               id="checkbox-${item.index}" 
                               onchange="toggleProduct(${item.index})"
                               ${isSelected ? 'checked' : ''}>
                    </td>
                    <td>${item.index}</td>
                    <td>${item.name}</td>
                    <td>${item.spec}</td>
                    <td>${item.price}</td>
                    <td>${item.boxCount}</td>
                    <td>${item.purchasePrice}</td>
                    <td class="quantity-cell">
                        <div class="quantity-wrapper">
                            <button class="quantity-btn" id="minus-${item.index}" 
                                    onclick="changeQuantity(${item.index}, -1)" 
                                    ${!isSelected ? 'disabled' : ''}>-</button>
                            <input type="number" class="quantity-input" id="quantity-${item.index}" 
                                   value="${quantity}" min="1" max="999" 
                                   onchange="updateQuantity(${item.index})"
                                   ${!isSelected ? 'disabled' : ''}>
                            <button class="quantity-btn" id="plus-${item.index}" 
                                    onclick="changeQuantity(${item.index}, 1)" 
                                    ${!isSelected ? 'disabled' : ''}>+</button>
                        </div>
                    </td>
                    <td class="remark-cell">
                        <input type="text" class="remark-input" id="remark-${item.index}" 
                               placeholder="输入备注（选填）" value="${remark}"
                               onchange="updateRemark(${item.index})"
                               ${!isSelected ? 'disabled' : ''}>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            updateListEmptyState();
        }

        // 切换产品选中状态
        function toggleProduct(index) {
            const product = productData.find(p => p.index === index);
            const checkbox = document.getElementById(`checkbox-${index}`);
            const quantityInput = document.getElementById(`quantity-${index}`);
            const minusBtn = document.getElementById(`minus-${index}`);
            const plusBtn = document.getElementById(`plus-${index}`);
            const remarkInput = document.getElementById(`remark-${index}`);
            
            if (checkbox.checked) {
                quantityInput.disabled = false;
                minusBtn.disabled = false;
                plusBtn.disabled = false;
                remarkInput.disabled = false;
                if (!selectedProducts.some(p => p.index === index)) {
                    selectedProducts.push({
                        ...product,
                        quantity: 1,
                        remark: ''
                    });
                }
            } else {
                quantityInput.disabled = true;
                minusBtn.disabled = true;
                plusBtn.disabled = true;
                remarkInput.disabled = true;
                selectedProducts = selectedProducts.filter(p => p.index !== index);
            }
            renderSelectionList();
        }

        // 表格数量调整（+/-按钮）
        function changeQuantity(index, change) {
            const quantityInput = document.getElementById(`quantity-${index}`);
            let newQuantity = parseInt(quantityInput.value) + change;
            newQuantity = Math.max(1, Math.min(999, newQuantity));
            quantityInput.value = newQuantity;
            updateQuantity(index);
        }

        // 表格数量更新（手动输入）
        function updateQuantity(index) {
            const quantityInput = document.getElementById(`quantity-${index}`);
            let quantity = parseInt(quantityInput.value);
            
            if (isNaN(quantity) || quantity < 1) {
                quantity = 1;
                quantityInput.value = 1;
            } else if (quantity > 999) {
                quantity = 999;
                quantityInput.value = 999;
            }
            
            const selectedIndex = selectedProducts.findIndex(p => p.index === index);
            if (selectedIndex !== -1) {
                selectedProducts[selectedIndex].quantity = quantity;
                renderSelectionList(); // 同步更新清单
            }
        }

        // 清单数量调整（+/-按钮）
        function changeListQuantity(index, change) {
            const quantityInput = document.getElementById(`list-quantity-${index}`);
            let newQuantity = parseInt(quantityInput.value) + change;
            newQuantity = Math.max(1, Math.min(999, newQuantity));
            quantityInput.value = newQuantity;
            updateListQuantity(index);
        }

        // 清单数量更新（手动输入）
        function updateListQuantity(index) {
            const quantityInput = document.getElementById(`list-quantity-${index}`);
            let quantity = parseInt(quantityInput.value);
            
            if (isNaN(quantity) || quantity < 1) {
                quantity = 1;
                quantityInput.value = 1;
            } else if (quantity > 999) {
                quantity = 999;
                quantityInput.value = 999;
            }
            
            // 更新选中产品数组
            const selectedIndex = selectedProducts.findIndex(p => p.index === index);
            if (selectedIndex !== -1) {
                selectedProducts[selectedIndex].quantity = quantity;
                // 同步更新表格数量
                const tableQuantityInput = document.getElementById(`quantity-${index}`);
                if (tableQuantityInput) {
                    tableQuantityInput.value = quantity;
                }
                renderSelectionList(); // 重新渲染清单计算金额
            }
        }

        // 更新备注
        function updateRemark(index) {
            const remarkInput = document.getElementById(`remark-${index}`);
            const remark = remarkInput.value.trim();
            
            const selectedIndex = selectedProducts.findIndex(p => p.index === index);
            if (selectedIndex !== -1) {
                selectedProducts[selectedIndex].remark = remark;
                renderSelectionList();
            }
        }

        // 渲染选品清单（核心修改：备注位置+清单数量可改）
        function renderSelectionList() {
            const listItems = document.getElementById('listItems');
            const listTotal = document.getElementById('listTotal');
            listItems.innerHTML = '';
            
            let total = 0;
            
            if (selectedProducts.length > 0) {
                selectedProducts.forEach(product => {
                    const subtotal = product.price * product.quantity;
                    total += subtotal;
                    
                    const item = document.createElement('div');
                    item.className = 'list-item';
                    // 备注HTML - 移至产品名称后，样式更显著
                    const remarkHtml = product.remark ? `<span class="product-remark">【${product.remark}】</span>` : '';
                    
                    item.innerHTML = `
                        <div class="product-basic">
                            <div class="product-name">
                                ${product.name} ${remarkHtml}
                            </div>
                            <div class="product-spec">规格：${product.spec}</div>
                        </div>
                        <div class="product-details">
                            <div class="detail-item"><span class="detail-label">单价：</span>¥${product.price}/箱</div>
                            <div class="detail-item"><span class="detail-label">数量/箱：</span>${product.boxCount}</div>
                            <div class="detail-item"><span class="detail-label">进价：</span>${product.purchasePrice}</div>
                            <div class="detail-item">
                                <span class="detail-label">选购数量：</span>
                                <div class="list-quantity-wrapper">
                                    <button class="list-quantity-btn" onclick="changeListQuantity(${product.index}, -1)">-</button>
                                    <input type="number" class="list-quantity-input" id="list-quantity-${product.index}" 
                                           value="${product.quantity}" min="1" max="999" 
                                           onchange="updateListQuantity(${product.index})">
                                    <button class="list-quantity-btn" onclick="changeListQuantity(${product.index}, 1)">+</button>
                                </div>
                            </div>
                        </div>
                        <div class="product-actions">
                            <div class="product-subtotal">小计：¥${subtotal.toFixed(2)}</div>
                            <button class="delete-btn" onclick="removeProduct(${product.index})">删除</button>
                        </div>
                    `;
                    listItems.appendChild(item);
                });
            }
            
            listTotal.textContent = `合计金额：¥${total.toFixed(2)}`;
            updateListEmptyState();
        }

        // 移除单个产品
        function removeProduct(index) {
            const checkbox = document.getElementById(`checkbox-${index}`);
            const quantityInput = document.getElementById(`quantity-${index}`);
            const minusBtn = document.getElementById(`minus-${index}`);
            const plusBtn = document.getElementById(`plus-${index}`);
            const remarkInput = document.getElementById(`remark-${index}`);
            
            if (checkbox) {
                checkbox.checked = false;
                quantityInput.disabled = true;
                minusBtn.disabled = true;
                plusBtn.disabled = true;
                remarkInput.disabled = true;
                remarkInput.value = '';
            }
            selectedProducts = selectedProducts.filter(p => p.index !== index);
            renderSelectionList();
        }

        // 清空清单
        function clearSelection() {
            if (selectedProducts.length === 0) return;
            
            if (confirm('确定要清空所有已选产品吗？')) {
                document.querySelectorAll('.product-checkbox').forEach(checkbox => {
                    const index = parseInt(checkbox.id.replace('checkbox-', ''));
                    checkbox.checked = false;
                    
                    const quantityInput = document.getElementById(`quantity-${index}`);
                    const minusBtn = document.getElementById(`minus-${index}`);
                    const plusBtn = document.getElementById(`plus-${index}`);
                    const remarkInput = document.getElementById(`remark-${index}`);
                    
                    if (quantityInput) quantityInput.disabled = true;
                    if (minusBtn) minusBtn.disabled = true;
                    if (plusBtn) plusBtn.disabled = true;
                    if (remarkInput) {
                        remarkInput.disabled = true;
                        remarkInput.value = '';
                    }
                });
                selectedProducts = [];
                renderSelectionList();
            }
        }

        // 更新清单空状态显示
        function updateListEmptyState() {
            const listEmpty = document.getElementById('listEmpty');
            const listItems = document.getElementById('listItems');
            const listTotal = document.getElementById('listTotal');
            
            if (selectedProducts.length === 0) {
                listEmpty.style.display = 'block';
                listItems.style.display = 'none';
                listTotal.style.display = 'none';
            } else {
                listEmpty.style.display = 'none';
                listItems.style.display = 'flex';
                listTotal.style.display = 'block';
            }
        }

        // 排序表格
        function sortTable() {
            const sortType = document.getElementById('sortSelect').value;
            let sortedData = [...productData];
            
            switch(sortType) {
                case 'price-asc':
                    sortedData.sort((a, b) => a.price - b.price);
                    break;
                case 'price-desc':
                    sortedData.sort((a, b) => b.price - a.price);
                    break;
                case 'index':
                default:
                    sortedData.sort((a, b) => a.index - b.index);
                    break;
            }
            renderTable(sortedData);
        }

        // 初始化
        window.onload = function() {
            renderTable(productData);
            
            // 搜索事件
            document.getElementById('searchInput').addEventListener('input', function() {
                const keyword = this.value.trim().toLowerCase();
                if (!keyword) {
                    renderTable(productData);
                    return;
                }
                const filteredData = productData.filter(item => 
                    item.name.toLowerCase().includes(keyword) || 
                    item.spec.toLowerCase().includes(keyword)
                );
                renderTable(filteredData);
            });

            renderSelectionList();
        }
    </script>
